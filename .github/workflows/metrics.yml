name: Metrics
on:
  # Se actualiza automáticamente una vez al día
  schedule: [{cron: "0 0 * * *"}]
  # Te permite correrlo manualmente cuando quieras
  workflow_dispatch:
  # Se actualiza cada vez que haces un cambio en main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Usa la llave que acabamos de guardar
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Configuración base
          user: BSVS777
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Costa_Rica
          
          # Plugins adicionales (¡Aquí está lo visualmente genial!)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
